<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>足球爱</title>
    <script>
        // 判断是否为移动设备
        function isMobile() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            return /android|iphone|ipad|mobile/i.test(userAgent);
        }

        // 页面加载完成后执行判断
        document.addEventListener('DOMContentLoaded', () => {
            if (isMobile()) {
                window.location.href = "https://zuqiu.love/wx.png"; // 移动端地址
            } else {
                window.location.href = "https://zuqiu.love/wx.png"; // PC端地址
            }
        });
    </script>
</head>
<body>
    <h2>正在加载，请稍候...</h2>
</body>
</html>
